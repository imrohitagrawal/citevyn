# ────────────────────────────────────────────────────────────────────────────
# CiteVyn infrastructure — single file for local dev AND production.
#
# Profiles:
#   (none)         — db + redis (local development).
#   prod           — adds api, worker, caddy with production hardening.
#   backup         — one-shot Postgres dump (see scripts/backup.sh).
#
# Usage:
#   docker compose -f infra/docker/docker-compose.yml up -d db redis
#   docker compose -f infra/docker/docker-compose.yml --profile prod up -d
#   docker compose -f infra/docker/docker-compose.yml --profile backup run --rm backup
#
# This file is the canonical infra entry point — both ``make
# dev-up`` and ``make deploy`` invoke it. CI does not use it; tests
# run against an in-memory SQLite engine.
#
# Secrets handling: every secret (POSTGRES_PASSWORD, API keys)
# is sourced from the host-side ``infra/docker/.env`` via
# ``env_file``, and is never written into this file or
# interpolated into the inline ``environment:`` map. That keeps
# secrets out of git.
#
# It does NOT keep them out of the rendered config or out of the
# containers. ``env_file`` is resolved at render time: verified
# with ``docker compose -f infra/docker/docker-compose.yml
# --profile prod config``, every key in .env is printed in full
# under ``environment:`` for EVERY service that lists the file —
# db, api, worker, the one-shot ``backup`` job AND the
# internet-facing caddy (only redis, which has no ``env_file``,
# is clean). ``backup`` is easy to overlook because it is
# profile-gated, but it runs a shell in a postgres image with a
# host bind-mount at ./backups, so it is a more interesting
# surface than its size suggests. Each of those containers
# therefore also holds the whole secret set in its own
# ``/proc/1/environ``.
#
# Treat ``docker compose config`` output as secret material: do
# not paste it into an issue, a CI log, or a support thread.
# Narrowing this properly means per-service ``env_file`` scoping
# or compose ``secrets:``; neither is done yet. See #200.
# ────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app-defaults: &app-defaults
  restart: unless-stopped
  logging: *default-logging
  env_file:
    # Same env file for api + worker; secret values live in
    # infra/docker/.env which is gitignored. The file also lists
    # non-secret tunables (rate-limit windows, log level) that
    # every app container needs.
    - .env
  environment: &app-env
    # Non-secret overrides that differ from the host-side defaults
    # in .env.example. Connection strings live in infra/docker/.env
    # (``env_file:`` above) so they stay out of git — but NOT out of
    # ``docker compose config`` output or ``/proc/1/environ``, which
    # render/receive the whole .env regardless (see the file header).
    # The .env file uses the docker-internal hostnames (``db``,
    # ``redis``) which are not reachable from outside the compose
    # network.
    CITEVYN_ENVIRONMENT: production
    CITEVYN_RATE_LIMIT_ENABLED: "true"
    CITEVYN_RATE_LIMIT_WINDOW_SECONDS: "3600"
    CITEVYN_RATE_LIMIT_DEMO_USER_PER_HOUR: "30"
    CITEVYN_RATE_LIMIT_ADMIN_PER_HOUR: "1000"
    PYTHONUNBUFFERED: "1"

services:
  # ──────────────── Stateful services (always-on) ────────────────
  # The db port is published on 127.0.0.1 only — the api still
  # reaches it on the docker network (host: ``db``). The loopback
  # binding lets the smoke script and any host-side ``uv run
  # alembic`` connect on localhost without exposing the database
  # to the public network. The production security boundary is
  # Caddy on :443; Postgres is never reachable from the internet.
  db:
    image: pgvector/pgvector:pg18
    container_name: citevyn-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: citevyn
      POSTGRES_USER: citevyn
      # pgvector/pgvector:pg18 (Postgres 18) refuses to initdb when the
      # data volume is mounted directly at /var/lib/postgresql/data (the
      # pre-18 convention this file uses). Point PGDATA at a subdirectory
      # of that mount so initdb runs below the mount root, which
      # sidesteps the pg18 layout check.
      #
      # CAUTION: this changes where Postgres looks for the cluster. On a
      # fresh volume initdb creates it under .../data/pgdata — correct.
      # But if a volume ALREADY holds a cluster at the mount root
      # (.../data/PG_VERSION, i.e. the old no-PGDATA layout), the
      # entrypoint won't find it at the subdir and will initdb a NEW
      # EMPTY cluster there, silently orphaning the old data. Only
      # introduce PGDATA on greenfield volumes; before deploying against
      # any existing volume, confirm it has no root-layout cluster (or
      # migrate it into the subdir first).
      PGDATA: /var/lib/postgresql/data/pgdata
    env_file:
      - .env
    volumes:
      - citevyn_pgdata:/var/lib/postgresql/data
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    ports:
      # 127.0.0.1 = loopback only. Override the host port with
      # ``CITEVYN_DB_PORT`` if 5432 is taken on the host.
      - "127.0.0.1:${CITEVYN_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citevyn -d citevyn"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:8-alpine
    container_name: citevyn-redis
    restart: unless-stopped
    logging: *default-logging
    # No public port by default — Redis is only reachable from
    # inside the compose network. To debug from the host, run
    #   docker compose exec redis redis-cli.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ──────────────── Stateless app (prod profile) ────────────────
  api:
    profiles: ["prod"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      args:
        VERSION: ${VERSION:-dev}
    image: citevyn/api:${VERSION:-dev}
    container_name: citevyn-api
    <<: *app-defaults
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      # Per-app overrides that don't belong in the shared
      # env_file (the worker uses stub LLM in CI but the api
      # needs the real provider in prod).
      CITEVYN_LLM_PROVIDER: ${CITEVYN_LLM_PROVIDER:-stub}
      CITEVYN_LLM_MODEL: ${CITEVYN_LLM_MODEL:-}
    # No host port — Caddy proxies in via the docker network.
    healthcheck:
      # ``app.main:app`` exposes ``GET /health`` which does not
      # touch the database or the LLM. The default uvicorn
      # port is 8000; this matches the Caddyfile reverse_proxy
      # block.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker:
    profiles: ["prod"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
      args:
        VERSION: ${VERSION:-dev}
    image: citevyn/worker:${VERSION:-dev}
    container_name: citevyn-worker
    <<: *app-defaults
    # One-shot ingest job: override the shared ``unless-stopped`` so the
    # worker is not restarted after it ingests the MVP sources and exits
    # 0 (see Dockerfile.worker CMD ``... run``). #81 item 7.
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      CITEVYN_LLM_PROVIDER: ${CITEVYN_LLM_PROVIDER:-stub}
      CITEVYN_LLM_MODEL: ${CITEVYN_LLM_MODEL:-}
    # No healthcheck: the worker is a one-shot batch that exits 0 when
    # ingestion completes, so a process-liveness probe is meaningless.
    # The previous ``pgrep -f citevyn-worker`` check could never pass —
    # procps is not installed in the slim image, and the process cmdline
    # is ``python -m app.worker.cli run``, which would not match the
    # pattern anyway. #81 item 8.

  caddy:
    profiles: ["prod"]
    image: caddy:2-alpine
    container_name: citevyn-caddy
    restart: unless-stopped
    logging: *default-logging
    env_file:
      # ACME email + CA override (staging for smoke, prod for
      # real). Real-secret check lives in
      # infra/docker/scripts/_env_guard.sh, which refuses to
      # run any prod entry point while the dev stubs from
      # ``make db-up`` are still in place.
      - .env
    environment:
      # ACME email is required for Let's Encrypt to notify the
      # operator about expiring certs. The dev-time default
      # below keeps ``docker compose config`` parsing happy on
      # a fresh clone: ``make db-up`` writes a bootstrapped
      # .env from prod.env.example (see the Makefile), but the
      # caddy service is behind the ``prod`` profile and won't
      # start from ``make demo`` anyway. The dev default and a
      # missing value are both refused by
      # infra/docker/scripts/_env_guard.sh (POSTGRES_PASSWORD,
      # CITEVYN_ADMIN_API_KEY, CITEVYN_ACME_EMAIL), so a raw
      # ``docker compose --profile prod up -d`` is the only
      # remaining way to start Caddy with a placeholder email.
      CITEVYN_ACME_EMAIL: ${CITEVYN_ACME_EMAIL:-dev@local.invalid}
      CITEVYN_ACME_CA: ${CITEVYN_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        # Wait for the api's /health probe to pass, not just for
        # the container to start. Without this, Caddy races
        # uvicorn on first boot and returns 502s for 30s+.
        condition: service_healthy

  # ──────────────── One-shot backup (backup profile) ────────────────
  backup:
    profiles: ["backup"]
    image: postgres:18-alpine
    container_name: citevyn-backup
    logging: *default-logging
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./backups:/backups
    # PGPASSWORD, not POSTGRES_PASSWORD. ``env_file`` supplies the latter, which
    # is what the postgres SERVER image reads to initialise a cluster; pg_dump is
    # a libpq CLIENT and reads PGPASSWORD. Without this the dump fails with
    # "fe_sendauth: no password supplied" — so `make backup` never worked, and
    # `make deploy-verify` could not get past its pre-deploy safety backup.
    #
    # Assigned inside the container from the env_file value rather than via a
    # compose ``environment:`` interpolation, so the secret still does not land
    # in the compose config or in /proc/1/environ of every other service (see the
    # note at the top of this file).
    # TWO bugs lived here, and the first masked the second.
    #
    # 1. ``pg_dump`` is a libpq CLIENT and reads PGPASSWORD. ``env_file`` supplies
    #    POSTGRES_PASSWORD, which is what the postgres SERVER image reads to
    #    initialise a cluster. So the dump died with "fe_sendauth: no password
    #    supplied" — `make backup` never worked, and `make deploy-verify` could
    #    not get past its pre-deploy safety backup.
    # 2. The flags were written as continuation lines under a folded (``>``)
    #    scalar. YAML does NOT fold lines that are more indented than the first,
    #    so each flag arrived as its own shell command ("sh: --format=custom: not
    #    found") and pg_dump ran bare — a plain-SQL dump to stdout rather than a
    #    custom-format dump to a file.
    #
    # Written as ONE line to remove the folding ambiguity entirely. PGPASSWORD is
    # exported inside the container from the env_file value, so the secret still
    # never enters the compose config (see the note at the top of this file).
    command:
      - sh
      - -c
      - export PGPASSWORD="$$POSTGRES_PASSWORD"; exec pg_dump -h db -U citevyn -d citevyn --format=custom --no-owner --no-privileges -f "/backups/citevyn-$$(date -u +%Y%m%dT%H%M%SZ).dump"
    depends_on:
      db:
        condition: service_healthy

volumes:
  citevyn_pgdata:
  caddy_data:
  caddy_config: