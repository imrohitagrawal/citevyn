<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Icons live in frontend/public/, which Vite copies verbatim into dist/ and the
      API then serves from its StaticFiles mount. favicon.ico is listed alongside the
      SVG because plenty of clients (Windows, pinned tabs, feed readers) request
      /favicon.ico by convention regardless of what these tags say.
      backend/tests/test_frontend_assets.py asserts every local href below resolves.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffd75e" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#161618" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CiteVyn — a cited RAG assistant for Claude, Claude Code, Codex, and Gemini."
    />
    <meta name="color-scheme" content="light dark" />
    <title>CiteVyn — Cited answers for your AI tools</title>

    <!-- Anton (display) + Satoshi (body) via Fontshare / Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preconnect"
      href="https://api.fontshare.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
    />

    <!-- Softly theme: Outfit (sans) + Reenie Beanie (cursive). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Reenie+Beanie&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
