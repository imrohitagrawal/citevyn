# Alembic configuration for CiteVyn AI.
#
# The database URL is read from the ``CITEVYN_DATABASE_URL`` environment
# variable by ``env.py``. We do not check a URL into version control so
# that developers and CI can use different engines (local Postgres, test
# SQLite) without editing this file.
#
# Run from the repository root:
#
#     uv run alembic -c db/alembic.ini upgrade head
#     uv run alembic -c db/alembic.ini revision --autogenerate -m "msg"
#

[alembic]
script_location = db
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8

# The values below are placeholders; ``env.py`` overrides them from the
# environment at runtime. Keeping them here satisfies Alembic's parser.
sqlalchemy.url = sqlite:///placeholder.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
