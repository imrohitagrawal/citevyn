name: frontend-live-e2e

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-live-e2e.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-live-e2e.yml'

permissions:
  contents: read

jobs:
  live-e2e:
    name: Live-mode Playwright (stub backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run live-mode e2e suite
        # VITE_LIVE_STUB=1 enables the in-process stub plugin
        # (frontend/vite.liveStub.ts) so the dev server returns
        # canned responses with a controlled delay — no real backend
        # is required. The Playwright live config then sets
        # VITE_API_LIVE=true so the front end exercises sendLive
        # instead of the demo path. The grep "live only" filter
        # restricts the run to live-only tests
        # (currently: pending-bubble loading indicator).
        run: VITE_LIVE_STUB=1 npx playwright test --config=playwright.live.config.ts
      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live
          path: frontend/playwright-report-live
          retention-days: 7
