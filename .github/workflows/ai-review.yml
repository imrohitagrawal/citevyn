name: AI Review

# Triggers Claude review from the shared reusable workflow on every PR.
# Review is advisory — does NOT block merges (continue-on-error in the reusable).
# To change review behavior: edit .github/review-instructions.md in imrohitagrawal/.github.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

# Avoid duplicate reviews on rapid pushes.
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude code review
    uses: imrohitagrawal/.github/.github/workflows/ai-review.yml@main
    with:
      claude-model: claude-opus-4-8
      max-diff-lines: 600
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}