name: CodeQL

# GitHub's built-in semantic code analysis. Free for everyone — even private repos.
# Catches real security bugs (SQLi, SSRF, auth bypass, unsafe deserialization, etc.)
# that AI review tools consistently miss. AI review + CodeQL is the recommended pairing.
#
# Triggers:
#   - on every PR (security-extended queries, full scan)
#   - on push to main (security-extended queries, full scan)
#   - weekly schedule (lightweight scheduled scan to catch new CVEs in dependencies)
#
# Findings appear in the Security tab. PR-scoped findings also post as inline PR comments.
# Code scanning alerts default to "informational" — they don't block merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 03:07 UTC every Monday — off the :00 mark so we don't pile onto GitHub's global batch.
    - cron: "7 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            # `security-extended` covers more queries than `security-and-quality` but still
            # low false-positive rate. Tweak to `security-and-quality` if alerts get noisy.
            queries: security-extended
            # Paths to analyze. Excludes tests and migrations where low-signal findings dominate.
            paths: backend/app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: ${{ matrix.queries }}
          paths: ${{ matrix.paths }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
