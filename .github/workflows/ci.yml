# CI for CiteVyn. The default `test` job runs the hermetic
# in-memory SQLite suite plus the static checks documented in
# backend/README.md.
#
# A second `postgres-migrations` job runs after `test` succeeds. It
# spins up a real Postgres service, applies every Alembic migration
# (``alembic upgrade head``), and runs the `postgres`-marked
# integration tests against the same database. This catches drift
# between the SQLAlchemy models and the schema (e.g. native ENUM
# promotion in migration 0002, JSONB in migration 0003) before it
# can ship to production.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install --upgrade pip uv
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest (SQLite, no postgres marker)
        # Default run skips the `postgres` integration tests because
        # CITEVYN_PG_TEST_URL is unset. The `postgres` marker is
        # opt-in and gated by an env var, so this is hermetic.
        run: uv run pytest -m "not postgres" -v

  postgres-migrations:
    name: alembic + postgres integration tests
    runs-on: ubuntu-latest
    needs: test
    # Only run on internal pushes / PRs from this repo. Forks do
    # not get a Postgres service — it would be wasted compute and
    # we don't trust secrets on fork PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    services:
      postgres:
        # pgvector image (Postgres 16 + the ``vector`` extension) so migration
        # 0004 can CREATE EXTENSION vector and the pgvector integration tests run.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: citevyn
          POSTGRES_PASSWORD: citevyn
          POSTGRES_DB: citevyn_pg_test
        ports:
          - 5432:5432
        # Health-check the service so downstream steps don't race
        # the boot. ``pg_isready`` returns 0 once Postgres accepts
        # connections.
        options: >-
          --health-cmd "pg_isready -U citevyn -d citevyn_pg_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # ``CITEVYN_DATABASE_URL`` is what ``db/env.py`` reads when
      # applying migrations. ``CITEVYN_PG_TEST_URL`` is what the
      # pytest ``postgres`` marker looks at. Point both at the same
      # service so alembic and pytest agree on the target database.
      CITEVYN_DATABASE_URL: postgresql+psycopg://citevyn:citevyn@localhost:5432/citevyn_pg_test
      CITEVYN_PG_TEST_URL: postgresql+psycopg://citevyn:citevyn@localhost:5432/citevyn_pg_test
    defaults:
      run:
        # ``alembic.ini`` declares ``script_location = db`` relative
        # to CWD; running from the repo root matches the
        # ``backend/README.md`` convention. The pytest step still
        # uses ``backend`` because pyproject.toml and the venv live
        # there.
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install --upgrade pip uv
      - name: Sync dependencies
        working-directory: backend
        run: uv sync --group dev
      - name: Alembic upgrade head against Postgres
        # Exercises every migration (0001 initial schema,
        # 0002 promote StrEnum to native PG ENUM, 0003 add
        # chunks.embedding) against a real Postgres engine. Any
        # SQLAlchemy-vs-schema drift fails here.
        #
        # Run from ``backend/`` because that is where
        # ``uv sync`` created the venv (and installed
        # ``alembic``). The ``-c ../db/alembic.ini`` path
        # resolves against the step's CWD, so it points at
        # the repo-root ``db/`` tree from the ``backend/`` dir.
        working-directory: backend
        run: uv run alembic -c ../db/alembic.ini upgrade head
      - name: Postgres integration tests
        working-directory: backend
        # The ``postgres`` marker is opt-in and gated by
        # ``CITEVYN_PG_TEST_URL``; the URL above enables it.
        run: uv run pytest -m postgres -v

  compose-db-smoke:
    name: docker compose db-stack smoke (fresh volume, pg18)
    runs-on: ubuntu-latest
    # Bound the whole job: db-up already caps its pg_isready wait at
    # 60s, but the image pull inside ``docker compose up`` is otherwise
    # unbounded (it would ride GitHub's 6h default). 15 min is generous
    # for pull + boot + migrate (~2-3 min typical) while still failing
    # fast on a hung pull or a crash-looping container.
    timeout-minutes: 15
    # Independent of ``test`` / ``postgres-migrations``: this job proves
    # the REAL compose stack boots, which is orthogonal to Python lint
    # or migration correctness. Running in parallel gives a clean,
    # standalone infra signal.
    #
    # No secrets are required — ``make db-up`` bootstraps infra/docker/.env
    # from prod.env.example with the dev-only ``citevyn`` bootstrap
    # password (the prod _env_guard.sh path is never taken here), so this
    # is safe to run on fork PRs too and needs no ``if:`` fork guard.
    #
    # WHY THIS EXISTS: ``docker compose config`` (run elsewhere) only
    # proves the YAML parses, and ``postgres-migrations`` uses a pg16
    # SERVICE CONTAINER — NEITHER boots the actual compose ``db`` service
    # (pgvector/pgvector:pg18 with the PGDATA subdir fix). A regression of
    # the PGDATA layout, the pg18 image, or the .env bootstrap password
    # would sail through CI and only crash-loop on a real greenfield
    # deploy. This job closes that gap (issue #52).
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install --upgrade pip uv
      - name: Sync dependencies (alembic lives in the backend venv)
        working-directory: backend
        run: uv sync --group dev
      - name: Bootstrap .env + fresh volume (tear down any pre-existing stack)
        # ``make env-bootstrap`` writes infra/docker/.env from
        # prod.env.example (dev-only stub secrets) — REQUIRED before any
        # ``docker compose`` call because the compose file's
        # ``env_file: .env`` refs make even ``down`` fail if it's absent.
        # GitHub runners are ephemeral (fresh by default), but the
        # ``down -v`` is explicit: the greenfield boot is the exact
        # regression case, so never rely on a pre-seeded volume. Doing
        # the bootstrap here (not only inside make ci-smoke) also means
        # the ``always()`` teardown below has a .env to parse even if the
        # smoke fails early.
        run: |
          make env-bootstrap
          docker compose -f infra/docker/docker-compose.yml down -v --remove-orphans
      - name: Boot DB stack on a fresh volume, verify it serves, migrate
        # ``make ci-smoke`` = db-up (fresh boot + pg_isready) + db-verify
        # (SELECT 1 + CREATE EXTENSION vector) + migrate (alembic upgrade
        # head, which also proves the bootstrap password matches DB_URL).
        # db-up bootstraps infra/docker/.env from prod.env.example; the
        # 60s pg_isready wait inside db-up is the bounded health gate.
        run: make ci-smoke
      - name: Capture db logs on failure (example creds only — no secrets)
        if: failure()
        run: docker compose -f infra/docker/docker-compose.yml logs db
      - name: Tear down + destroy the fresh volume (always)
        if: always()
        run: docker compose -f infra/docker/docker-compose.yml down -v --remove-orphans
