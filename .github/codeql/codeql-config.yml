# CodeQL configuration for CiteVyn.
#
# This config is referenced by .github/workflows/codeql.yml via the
# `config-file` input on github/codeql-action/init. It excludes one
# query that has a high false-positive rate on this codebase: the
# request-id middleware in backend/app/core/middleware.py logs the
# X-Request-ID header (an opaque correlation id, not a credential)
# and the health route logs a fixed event name string; both are
# clear-text-logging false positives that the project's
# build_log_event redaction pass already guards against.
#
# If a real clear-text-logging issue is ever introduced, fix it
# upstream rather than re-enabling the query - the suppression here
# is a pragmatic choice for a small backend, not a license to log
# secrets.

name: "CiteVyn CodeQL config"

query-filters:
  - exclude:
      id: py/clear-text-logging-sensitive-data
