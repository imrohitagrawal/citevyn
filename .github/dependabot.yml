# Dependabot keeps the dependency graph current. Three ecosystems
# are tracked: Python (uv), Docker base images, and GitHub Actions.
#
# Cadence is weekly for Python and Docker, monthly for Actions —
# Actions pins churn less often and we'd rather not have noisy
# PRs on every release.

version: 2
updates:
  # ──────────── Python (uv) ────────────
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    # Group patch + minor updates into a single PR so reviewers
    # see "dependencies: monthly rollup" rather than 12 PRs.
    groups:
      python-runtime:
        applies-to: version-updates
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic"
          - "pydantic-settings"
          - "sqlalchemy"
          - "alembic"
          - "httpx"
          - "redis"
          - "psycopg"
      python-dev:
        applies-to: version-updates
        patterns:
          - "pytest"
          - "pytest-asyncio"
          - "ruff"
          - "pyright"
          - "fakeredis"
    # Auto-merge for patch updates of well-trusted deps; the CI
    # gate (lint + typecheck + test) is the actual safety net.
    # PRs with a green CI are squash-merged by the bot.
    labels:
      - "dependencies"
      - "python"

  # ──────────── Docker base images ────────────
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    # Only the FROM lines we maintain are tracked. The base
    # images for our api/worker are pinned to minor versions
    # (e.g. python:3.12-slim-bookworm, caddy:2-alpine,
    # pgvector/pgvector:pg16) so patch bumps auto-roll.
    labels:
      - "dependencies"
      - "docker"

  # ──────────── GitHub Actions ────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
