# Dependabot keeps the dependency graph current. Four ecosystems
# are tracked: Python (uv), Docker base images, Docker Compose
# service images, and GitHub Actions.
#
# Cadence is weekly for Python and Docker, monthly for Actions —
# Actions pins churn less often and we'd rather not have noisy
# PRs on every release.
#
# Auto-merge policy (since 2026-06-21):
#   Branch protection on ``main`` requires 5 status checks (see
#   Settings → Branches → main). To enable auto-merge at the repo
#   level, go to Settings → General → "Allow auto-merge" and
#   enable it, then enable auto-merge on individual Dependabot PRs
#   via the "Enable auto-merge" button in the PR UI. Without
#   branch protection, do NOT enable auto-merge — Dependabot would
#   merge PRs before CI has had a chance to run.
#   * Patch + security updates auto-merge once CI passes.
#   * Minor + major version updates still open PRs for human
#     review. Major bumps can change runtime behavior (e.g.
#     Python 3.12→3.14 in the Docker image) or remove inputs
#     (docker/login-action v4 dropped a few), and should not
#     land without eyes on the diff.
#   * The ``target-branch`` is pinned to ``main`` explicitly even
#     though that's the repo default — makes the intent obvious
#     to future readers and prevents surprises if a non-default
#     branch ever becomes the merge target.

version: 2
updates:
  # ──────────── Python (uv) ────────────
  - package-ecosystem: "uv"
    directory: "/backend"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    # Cap concurrent open Dependabot PRs so the queue stays
    # reviewable. 5 matches the historical max we've seen
    # (uv-runtime, uv-dev, plus 3 standalones).
    open-pull-requests-limit: 5
    # Auto-rebase keeps weekly PRs from rotting when main moves
    # before the weekly cron fires.
    rebase-strategy: "auto"
    # ``deps(uv): bump fastapi to 0.138.0`` reads better in
    # ``git log`` than ``Bump the python-runtime group...``.
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: scope
    # Group patch + minor updates into a single PR so reviewers
    # see "dependencies: weekly rollup" rather than 12 PRs.
    # Dependabot honors grouping when a group contains more than
    # one package; singletons still open as their own PR.
    groups:
      python-runtime:
        applies-to: version-updates
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic"
          - "pydantic-settings"
          - "sqlalchemy"
          - "alembic"
          - "httpx"
          - "redis"
          - "psycopg"
      python-dev:
        applies-to: version-updates
        patterns:
          - "pytest"
          - "pytest-asyncio"
          - "ruff"
          - "pyright"
          - "fakeredis"
    labels:
      - "dependencies"
      - "python"

  # ──────────── Docker base images ────────────
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(docker)"
      include: scope
    # Tracks ``FROM`` lines in ``Dockerfile.api`` and
    # ``Dockerfile.worker`` (e.g. python:3.12-slim-bookworm,
    # ghcr.io/astral-sh/uv:python3.12-bookworm-slim). The
    # ``docker-compose`` ecosystem below separately covers
    # the ``image:`` refs in the compose file.
    # Group ALL base-image bumps into ONE PR (#82): the uv builder
    # (ghcr.io/astral-sh/uv:python3.X) and the slim runtime
    # (python:3.X-slim-bookworm) MUST move in lockstep, or a minor bump
    # drifts the builder/runtime interpreter apart and ships a
    # non-booting image (the exact class #34 fixed). One grouped PR
    # keeps the two ``FROM`` interpreters aligned.
    groups:
      docker-base-images:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "docker"

  # ──────────── Compose service images ────────────
  - package-ecosystem: "docker-compose"
    directory: "/infra/docker"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(docker)"
      include: scope
    # Tracks ``image:`` references in
    # ``infra/docker/docker-compose.yml`` (pgvector, redis,
    # caddy, postgres). Without this entry the service
    # images would silently rot.
    labels:
      - "dependencies"
      - "docker"

  # ──────────── GitHub Actions ────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps(ci)"
      include: scope
    labels:
      - "dependencies"
      - "ci"
